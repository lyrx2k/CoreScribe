name: Update README Hash

on:
  release:
    types: [published]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Release Data
        id: data
        run: |
          # Hol den neuesten Release Tag
          TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name')
          
          # Finde die .exe URL und lade sie
          URL=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.assets[] | select(.name | endswith(".exe")) | .browser_download_url' | head -n 1)
          curl -L -o CoreScribe.exe "$URL"
          
          # Hash berechnen
          HASH=$(sha256sum CoreScribe.exe | awk '{ print $1 }')
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Patch README.md
        run: |
          TAG="${{ steps.data.outputs.tag }}"
          HASH="${{ steps.data.outputs.hash }}"
          
          # Erstelle den neuen Block (escaped für sed)
          NEW_BLOCK="> [!IMPORTANT]\n> **Latest Release Integrity ($TAG)**\n>\n> To ensure you are using the authentic build, you can verify the executable:\n> - **SHA-256:** \`$HASH\`\n>\n> *(Verify via PowerShell: \`Get-FileHash .\\\\CoreScribe.exe\`)*"
          
          # Nutze Perl für den Austausch (behandelt Newlines besser als sed)
          perl -i -0777 -pe "s/.*?/\n$NEW_BLOCK\n/s" README.md

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-update release hash to $TAG [skip ci]" || echo "No changes to commit"
          git push
